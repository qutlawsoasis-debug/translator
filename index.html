<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Установка Оффлайн Переводчика</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #4CAF50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #b3b3b3;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .download-btn {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }
        .download-btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
        .download-btn:active {
            transform: translateY(1px);
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎙️</div>
        <h1>Оффлайн Переводчик</h1>
        <p>Для работы аппаратного USB-ключа требуется установить приложение-компаньон. После установки оно будет запускаться автоматически.</p>
        <!-- Ссылка будет указывать на релизный APK, сгенерированный GitHub Actions -->
        <a href="https://github.com/qutlawsoasis-debug/translator/releases/latest/download/Translator.apk" class="download-btn">Скачать APK</a>
    </div>
</body>
</html>
