name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
        fi
    - name: Download libsentencepiece.so from RTranslator
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # Скачиваем APK с явными редиректами и user-agent
        curl -L \
          --user-agent "Mozilla/5.0" \
          --max-redirs 10 \
          -o /tmp/rtranslator.apk \
          "https://github.com/niedev/RTranslator/releases/download/2.1.5/RTranslator_2.1.5.apk"
        
        # Проверяем что скачалось
        echo "Downloaded file size:"
        ls -lh /tmp/rtranslator.apk
        file /tmp/rtranslator.apk
        
        # Распаковываем .so из APK
        cd /tmp
        unzip -o rtranslator.apk "lib/arm64-v8a/libsentencepiece.so"
        
        # Копируем в проект
        cp /tmp/lib/arm64-v8a/libsentencepiece.so \
          $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libsentencepiece.so
        
        echo "Result:"
        ls -lh $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/

    - name: Build with Gradle
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -f release.jks ]; then
          export KEYSTORE_FILE="$(pwd)/release.jks"
        fi
        if gradle assembleDebug; then
          echo "Build succeeded"
        else
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git checkout -b build-logs
          git add app/.cxx/**/*.txt app/.cxx/**/*.log -f
          git commit -m "Upload build logs" || true
          git push origin build-logs -f || true
          exit 1
        fi

    - name: Upload Build Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          app/build/reports/
          app/.cxx/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TalkSync-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Extract Version
      if: github.ref == 'refs/heads/main'
      id: extract_version
      run: |
        VERSION=$(grep -oP 'versionName "\K[^"]+' app/build.gradle)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename APK for permanent link
      if: github.ref == 'refs/heads/main'
      run: |
        cd app/build/outputs/apk/debug
        apk_file=$(ls *.apk | head -n 1)
        mv "$apk_file" TalkSync_latest.apk

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/TalkSync_latest.apk
        tag_name: v${{ steps.extract_version.outputs.version }}
        name: ${{ steps.extract_version.outputs.version }}
        body: |
          TalkSync APK (Автоматическая сборка)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
